# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a package using Gradle and then publish it to GitHub packages when a release is created
# For more information see: https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#Publishing-using-gradle

name: Build Mod & Publish

on:
  workflow_dispatch:
    branches:
      - GatheringChunks-1.21.1
    inputs:
      version:
        description: 'Version (Tag)'
        required: true
        type: string
      release_notes:
        description: 'Release Notes'
        required: true
        type: string
      loader:
        description: 'Loader'
        required: true
        type: choice
        options:
          - fabric
          - neoforge
          - both
      publish:
        description: 'Publish to GitHub Packages'
        required: true
        type: boolean
        default: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build Fabric
      if: ${{ inputs.loader == 'fabric' || inputs.loader == 'both' }}
      run: ./gradlew fabric:jar fabric:remapJar

    - name: Build NeoForge
      if: ${{ inputs.loader == 'neoforge' || inputs.loader == 'both' }}
      run: ./gradlew neoforge:jar

    - name: Publish to GitHub Packages
      if: ${{ inputs.publish == true }}
      run: ./gradlew publish
      env:
        USERNAME: ${{ github.actor }}
        TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Release and Upload Fabric Jars
      if: ${{ inputs.loader == 'fabric' || inputs.loader == 'both' }}
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.version }}
        body: ${{ inputs.release_notes }}
        files: |
          fabric/build/libs/*.jar
          !fabric/build/libs/*-dev.jar
          !fabric/build/libs/*-sources.jar
          !fabric/build/libs/*-javadoc.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Release and Upload NeoForge Jars
      if: ${{ inputs.loader == 'neoforge' || inputs.loader == 'both' }}
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.version }}
        body: ${{ inputs.release_notes }}
        files: |
          neoforge/build/libs/*.jar
          !neoforge/build/libs/*-dev.jar
          !neoforge/build/libs/*-sources.jar
          !neoforge/build/libs/*-javadoc.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
