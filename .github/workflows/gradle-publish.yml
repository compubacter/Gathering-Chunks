name: Build Mod & Publish
on:
  workflow_dispatch:
    branches:
      - GatheringChunks-1.21.1
    inputs:
      version:
        description: 'Version Tag (e.g. v1.2.0)'
        required: true
        type: string
      title:
        description: 'Release Title (e.g. My Mod v1.2.0)'
        required: true
        type: string
      release_notes:
        description: 'Release Notes'
        required: true
        type: string
      loader:
        description: 'Loader'
        required: true
        type: choice
        options:
          - fabric
          - neoforge
          - both
      publish_github:
        description: 'Publish to GitHub Releases'
        required: true
        type: boolean
        default: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build Fabric
      if: ${{ inputs.loader == 'fabric' || inputs.loader == 'both' }}
      run: ./gradlew :Fabric:jar :Fabric:remapJar

    - name: Build NeoForge
      if: ${{ inputs.loader == 'neoforge' || inputs.loader == 'both' }}
      run: ./gradlew :NeoForge:jar

    - name: Upload Fabric to GitHub Release
      if: ${{ inputs.publish_github && (inputs.loader == 'fabric' || inputs.loader == 'both') }}
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.version }}
        name: ${{ inputs.title }}
        body: ${{ inputs.release_notes }}
        files: |
          Fabric/build/libs/*.jar
          !Fabric/build/libs/*-dev.jar
          !Fabric/build/libs/*-sources.jar
          !Fabric/build/libs/*-javadoc.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload NeoForge to GitHub Release
      if: ${{ inputs.publish_github && (inputs.loader == 'neoforge' || inputs.loader == 'both') }}
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.version }}
        name: ${{ inputs.title }}
        body: ${{ inputs.release_notes }}
        files: |
          NeoForge/build/libs/*.jar
          !NeoForge/build/libs/*-dev.jar
          !NeoForge/build/libs/*-sources.jar
          !NeoForge/build/libs/*-javadoc.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
